name: Update Satellite TLEs

# Daily at 06:00 UTC. TLEs drift after ~7 days (km of along-track error);
# daily refresh is more than enough for pass-prediction accuracy. CelesTrak
# refreshes ~6× per day so any single fetch is at most 4h stale.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update-tles
      cancel-in-progress: false
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch TLEs
        run: python fetch_tles.py

      - name: Commit if changed
        run: |
          git config user.name  'firestorm-bot'
          git config user.email 'firestorm-bot@users.noreply.github.com'
          git add data/tles.json
          if git diff --cached --quiet; then
            echo 'No changes, skipping commit'
          else
            git commit -m "TLE refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
